# ============================================================================
# Genesis Knowledge App - Docker Compose for Coolify on kuberek.org
# ============================================================================
# Deployed via Coolify git integration.
#
# Infrastructure:
# - PostgreSQL: own instance (postgres:16-alpine), internal only
# - Keycloak: own instance, backed by local postgres (knowledge_keycloak DB)
# - Connects to coolify network to reach Traefik reverse proxy
# - Coolify handles reverse proxy (Traefik) and SSL termination
# - SSL terminated at Cloudflare tunnel, Traefik uses HTTP entrypoints
#
# Pre-deployment steps:
# 1. Set environment variables in Coolify:
#      DB_USERNAME, DB_PASSWORD, DB_NAME,
#      KC_DB_PASSWORD, KEYCLOAK_ADMIN_PASSWORD,
#      KC_CLIENT_SECRET, LLM_API_KEY
# ============================================================================

services:
  # ==========================================================================
  # PostgreSQL (Database)
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: knowledge_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-knowledge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-knowledge}
      POSTGRES_DB: ${DB_NAME:-knowledge_db}
    volumes:
      - knowledge_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-knowledge} -d ${DB_NAME:-knowledge_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ==========================================================================
  # Keycloak (Identity Provider)
  # ==========================================================================
  knowledge_keycloak:
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
    image: knowledge-keycloak:latest
    container_name: knowledge_keycloak
    command: start --import-realm --hostname-strict=false
    restart: unless-stopped
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${KC_DB_NAME:-knowledge_keycloak}
      - KC_DB_USERNAME=${KC_DB_USERNAME:-knowledge}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_HOSTNAME=${KC_HOSTNAME:-https://genesis-knowledge-demo-auth.kuberek.org}
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.knowledge-keycloak.rule=Host(`${KC_HOSTNAME_FQDN:-genesis-knowledge-demo-auth.kuberek.org}`)"
      - "traefik.http.routers.knowledge-keycloak.entryPoints=http"
      - "traefik.http.services.knowledge-keycloak.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================================================
  # Knowledge App (FastAPI + React SPA)
  # ==========================================================================
  knowledge_app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-https://genesis-knowledge-demo-auth.kuberek.org}
    image: knowledge-app:latest
    container_name: knowledge_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      knowledge_keycloak:
        condition: service_started
    environment:
      - ENV_FOR_DYNACONF=production
      - KNOWLEDGE_DATABASE__HOST=${DB_HOST:-postgres}
      - KNOWLEDGE_DATABASE__PORT=${DB_PORT:-5432}
      - KNOWLEDGE_DATABASE__NAME=${DB_NAME:-knowledge_db}
      - KNOWLEDGE_DATABASE__USER=${DB_USERNAME:-knowledge}
      - KNOWLEDGE_DATABASE__PASSWORD=${DB_PASSWORD}
      - KNOWLEDGE_KEYCLOAK__SERVER_URL=${KEYCLOAK_SERVER_URL:-https://genesis-knowledge-demo-auth.kuberek.org}
      - KNOWLEDGE_KEYCLOAK__REALM=knowledge
      - KNOWLEDGE_KEYCLOAK__CLIENT_ID=knowledge-app
      - KNOWLEDGE_KEYCLOAK__CLIENT_SECRET=${KC_CLIENT_SECRET:-knowledge-app-secret}
      - KNOWLEDGE_LLM__API_URL=${LLM_API_URL:-https://litellm-production-f079.up.railway.app}
      - KNOWLEDGE_LLM__API_KEY=${LLM_API_KEY}
      - KNOWLEDGE_CORS_ORIGINS=${CORS_ORIGINS:-https://genesis-knowledge-demo.kuberek.org}
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.knowledge-app.rule=Host(`${APP_HOSTNAME:-genesis-knowledge-demo.kuberek.org}`)"
      - "traefik.http.routers.knowledge-app.entryPoints=http"
      - "traefik.http.services.knowledge-app.loadbalancer.server.port=8000"
    volumes:
      - knowledge_documents:/app/data/documents
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

# ============================================================================
# Networks
# ============================================================================
networks:
  coolify:
    external: true

# ============================================================================
# Volumes
# ============================================================================
volumes:
  knowledge_postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/knowledge_postgres_data
  knowledge_documents:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/knowledge_documents
